name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest=$MANIFEST_VERSION  tag=$TAG_VERSION"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build XPI
        run: npm run build

      - name: Locate artifact
        id: artifact
        run: |
          FILE=$(ls web-ext-artifacts/*.zip | head -n 1)
          echo "path=$FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
          body: |
            Firefox add-on build for `${{ github.ref_name }}`.

            **To publish:**
            1. Download `${{ steps.artifact.outputs.name }}` below.
            2. Upload it on [AMO](https://addons.mozilla.org/developers/) (Submit a new version).

            The draft is created automatically — publish this release once AMO has accepted the upload.
